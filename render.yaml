services:
  - type: web
    name: faceattendance-backend
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: DATA_DIR
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: FACE_API_URL
        sync: false
      - key: ADMIN_EMAIL
        value: harshitakothari2703@gmail.com
      - key: ADMIN_PASS
        value: Harshita@1234
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: PARENT_ALERT_WEBHOOK_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
  - type: web
    name: faceattendance-face-api
    runtime: python
    rootDir: face-api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGO_DB_NAME
        value: face-attendance
      - key: FACE_DATA_DIR
        sync: false
